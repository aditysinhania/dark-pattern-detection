<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 300px;
      padding: 20px;
      font-family: Arial, sans-serif;
      margin: 0;
    }

    .header {
      text-align: center;
      margin-bottom: 20px;
    }

    .logo {
      width: 48px;
      height: 48px;
      margin-bottom: 10px;
    }

    h1 {
      font-size: 18px;
      margin: 0;
      color: #333;
    }

    .status {
      padding: 10px;
      border-radius: 5px;
      margin-bottom: 15px;
      text-align: center;
    }

    .status.enabled {
      background-color: #e8f5e8;
      color: #2e7d32;
      border: 1px solid #4caf50;
    }

    .status.disabled {
      background-color: #ffebee;
      color: #c62828;
      border: 1px solid #f44336;
    }

    .controls {
      margin-bottom: 20px;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-bottom: 10px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 14px;
      transition: background-color 0.2s;
    }

    .btn-primary {
      background-color: #2196f3;
      color: white;
    }

    .btn-primary:hover {
      background-color: #1976d2;
    }

    .btn-secondary {
      background-color: #757575;
      color: white;
    }

    .btn-secondary:hover {
      background-color: #616161;
    }

    .btn-success {
      background-color: #4caf50;
      color: white;
    }

    .btn-success:hover {
      background-color: #388e3c;
    }

    .stats {
      background-color: #f5f5f5;
      padding: 15px;
      border-radius: 5px;
      margin-bottom: 15px;
    }

    .stat-item {
      display: flex;
      justify-content: space-between;
      margin-bottom: 5px;
    }

    .stat-label {
      font-weight: bold;
    }

    .stat-value {
      color: #666;
    }

    .patterns-list {
      max-height: 200px;
      overflow-y: auto;
      background-color: #f9f9f9;
      border-radius: 5px;
      padding: 10px;
    }

    .pattern-item {
      padding: 8px;
      margin-bottom: 5px;
      border-radius: 3px;
      background-color: white;
      border-left: 4px solid #ccc;
      font-size: 12px;
    }

    .pattern-name {
      font-weight: bold;
      margin-bottom: 3px;
    }

    .pattern-confidence {
      color: #666;
      font-size: 11px;
    }

    .footer {
      text-align: center;
      font-size: 12px;
      color: #666;
      margin-top: 15px;
    }

    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Dark Pattern Detector</h1>
  </div>

  <div id="status" class="status enabled">
    Extension Active
  </div>

  <div class="controls">
    <button id="analyzeBtn" class="btn-primary">Analyze Current Page</button>
    <button id="toggleBtn" class="btn-secondary">Disable Extension</button>
    <button id="clearBtn" class="btn-success">Clear Highlights</button>
  </div>

  <div id="stats" class="stats hidden">
    <div class="stat-item">
      <span class="stat-label">Patterns Detected:</span>
      <span id="patternCount" class="stat-value">0</span>
    </div>
    <div class="stat-item">
      <span class="stat-label">Overall Score:</span>
      <span id="overallScore" class="stat-value">0/100</span>
    </div>
  </div>

  <div id="patterns" class="patterns-list hidden">
    <!-- Patterns will be inserted here -->
  </div>

  <div class="footer">
    Analyzes text for manipulative patterns
  </div>

  <script src="popup.js"></script>
</body>
</html>
