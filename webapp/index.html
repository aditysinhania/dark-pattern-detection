<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark Pattern Detector - Test Interface</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            background-color: #f5f5f5;
        }

        .container {
            background: white;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 2px 20px rgba(0,0,0,0.1);
        }

        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 30px;
        }

        .input-section {
            margin-bottom: 30px;
        }

        textarea {
            width: 100%;
            min-height: 150px;
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            resize: vertical;
            font-family: inherit;
        }

        textarea:focus {
            outline: none;
            border-color: #2196f3;
        }

        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .btn-primary {
            background-color: #2196f3;
            color: white;
        }

        .btn-primary:hover {
            background-color: #1976d2;
        }

        .btn-secondary {
            background-color: #757575;
            color: white;
        }

        .btn-secondary:hover {
            background-color: #616161;
        }

        .btn-success {
            background-color: #4caf50;
            color: white;
        }

        .btn-success:hover {
            background-color: #388e3c;
        }

        .results-section {
            margin-top: 30px;
        }

        .score-display {
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 20px;
            padding: 20px;
            border-radius: 8px;
        }

        .score-low {
            background-color: #e8f5e8;
            color: #2e7d32;
        }

        .score-medium {
            background-color: #fff3e0;
            color: #f57c00;
        }

        .score-high {
            background-color: #ffebee;
            color: #c62828;
        }

        .patterns-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .pattern-card {
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 20px;
            background: #fafafa;
        }

        .pattern-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .pattern-name {
            font-size: 18px;
            font-weight: bold;
            color: #333;
        }

        .confidence-badge {
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: bold;
        }

        .confidence-high {
            background-color: #e8f5e8;
            color: #2e7d32;
        }

        .confidence-medium {
            background-color: #fff3e0;
            color: #f57c00;
        }

        .confidence-low {
            background-color: #ffebee;
            color: #c62828;
        }

        .pattern-description {
            color: #666;
            margin-bottom: 15px;
            font-size: 14px;
        }

        .matched-phrases {
            background: white;
            padding: 10px;
            border-radius: 4px;
            border-left: 3px solid #2196f3;
        }

        .matched-phrases strong {
            color: #333;
        }

        .phrase-tag {
            display: inline-block;
            background: #e3f2fd;
            color: #1976d2;
            padding: 2px 6px;
            margin: 2px 4px 2px 0;
            border-radius: 3px;
            font-size: 12px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .error {
            background-color: #ffebee;
            color: #c62828;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            border-left: 4px solid #f44336;
        }

        .sample-texts {
            margin-top: 40px;
            padding-top: 30px;
            border-top: 1px solid #ddd;
        }

        .sample-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
        }

        .sample-btn {
            background-color: #f5f5f5;
            color: #333;
            border: 1px solid #ddd;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }

        .sample-btn:hover {
            background-color: #e0e0e0;
        }

        .footer {
            text-align: center;
            margin-top: 40px;
            color: #666;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🕵️ Dark Pattern Detector</h1>

        <div class="input-section">
            <textarea id="textInput" placeholder="Enter text to analyze for dark patterns..."></textarea>

            <div class="controls">
                <button id="analyzeBtn" class="btn-primary">Analyze Text</button>
                <button id="clearBtn" class="btn-secondary">Clear</button>
                <button id="loadSampleBtn" class="btn-success">Load Sample</button>
            </div>
        </div>

        <div id="results" class="results-section" style="display: none;">
            <div id="scoreDisplay" class="score-display"></div>
            <div id="patternsContainer" class="patterns-grid"></div>
        </div>

        <div class="sample-texts">
            <h3>Sample Texts</h3>
            <div class="sample-buttons">
                <button class="sample-btn" data-text="Hurry! Only 2 left in stock! Limited time offer - ends tonight! Don't miss out on this amazing deal!">Urgency + Scarcity</button>
                <button class="sample-btn" data-text="Subscribe to our newsletter for exclusive deals! No thanks, I hate saving money. I prefer to pay full price for everything.">Confirmshaming</button>
                <button class="sample-btn" data-text="Free trial - then $9.99/month. Cancel anytime. Auto-renews after trial. Additional taxes and fees may apply.">Subscription Trap</button>
                <button class="sample-btn" data-text="By continuing you agree to our terms. Enable notifications to proceed. You must accept cookies to use this site.">Forced Action</button>
            </div>
        </div>

        <div class="footer">
            <p>Powered by AI • Analyzes text for manipulative patterns commonly used in web design</p>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:8000/analyze';
        const textInput = document.getElementById('textInput');
        const analyzeBtn = document.getElementById('analyzeBtn');
        const clearBtn = document.getElementById('clearBtn');
        const loadSampleBtn = document.getElementById('loadSampleBtn');
        const resultsDiv = document.getElementById('results');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const patternsContainer = document.getElementById('patternsContainer');

        // Sample texts
        const sampleTexts = [
            "Hurry! Only 2 left in stock! Limited time offer - ends tonight! Don't miss out on this amazing deal!",
            "Subscribe to our newsletter for exclusive deals! No thanks, I hate saving money. I prefer to pay full price for everything.",
            "Free trial - then $9.99/month. Cancel anytime. Auto-renews after trial. Additional taxes and fees may apply.",
            "By continuing you agree to our terms. Enable notifications to proceed. You must accept cookies to use this site."
        ];

        analyzeBtn.addEventListener('click', analyzeText);
        clearBtn.addEventListener('click', clearResults);
        loadSampleBtn.addEventListener('click', loadRandomSample);

        // Handle sample text buttons
        document.querySelectorAll('.sample-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                textInput.value = btn.dataset.text;
            });
        });

        // Enter key to analyze
        textInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && e.ctrlKey) {
                analyzeText();
            }
        });

        async function analyzeText() {
            const text = textInput.value.trim();
            if (!text) {
                alert('Please enter some text to analyze.');
                return;
            }

            analyzeBtn.disabled = true;
            analyzeBtn.textContent = 'Analyzing...';

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ text: text })
                });

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }

                const result = await response.json();
                displayResults(result);

            } catch (error) {
                console.error('Analysis error:', error);
                displayError(error.message);
            } finally {
                analyzeBtn.disabled = false;
                analyzeBtn.textContent = 'Analyze Text';
            }
        }

        function displayResults(result) {
            resultsDiv.style.display = 'block';

            // Display overall score
            const score = result.score || 0;
            let scoreClass = 'score-low';
            if (score > 30) scoreClass = 'score-medium';
            if (score > 60) scoreClass = 'score-high';

            scoreDisplay.className = `score-display ${scoreClass}`;
            scoreDisplay.textContent = `Dark Pattern Score: ${score}/100`;

            // Display patterns
            patternsContainer.innerHTML = '';

            if (!result.dark_patterns || result.dark_patterns.length === 0) {
                patternsContainer.innerHTML = '<div style="grid-column: 1 / -1; text-align: center; padding: 40px; color: #666;">No dark patterns detected in this text.</div>';
                return;
            }

            result.dark_patterns.forEach(pattern => {
                const card = createPatternCard(pattern);
                patternsContainer.appendChild(card);
            });
        }

        function createPatternCard(pattern) {
            const card = document.createElement('div');
            card.className = 'pattern-card';

            const confidence = pattern.confidence || 0;
            let confidenceClass = 'confidence-low';
            if (confidence > 0.4) confidenceClass = 'confidence-medium';
            if (confidence > 0.7) confidenceClass = 'confidence-high';

            card.innerHTML = `
                <div class="pattern-header">
                    <div class="pattern-name">${pattern.name}</div>
                    <div class="confidence-badge ${confidenceClass}">${(confidence * 100).toFixed(1)}%</div>
                </div>
                <div class="pattern-description">${pattern.description}</div>
                <div class="matched-phrases">
                    <strong>Matched phrases:</strong><br>
                    ${pattern.matched_phrases.map(phrase => `<span class="phrase-tag">${phrase}</span>`).join('')}
                </div>
            `;

            return card;
        }

        function displayError(message) {
            resultsDiv.style.display = 'block';
            scoreDisplay.className = 'score-display score-high';
            scoreDisplay.textContent = 'Error analyzing text';
            patternsContainer.innerHTML = `<div class="error">❌ ${message}</div>`;
        }

        function clearResults() {
            resultsDiv.style.display = 'none';
            textInput.value = '';
            textInput.focus();
        }

        function loadRandomSample() {
            const randomText = sampleTexts[Math.floor(Math.random() * sampleTexts.length)];
            textInput.value = randomText;
        }

        // Load a sample on page load
        loadRandomSample();
    </script>
</body>
</html>
